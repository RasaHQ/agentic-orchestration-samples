version: "3.1"

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true

slots:
  # Common return value slot for action results
  return_value:
    type: any
    mappings:
      - type: controlled
    scope: project

  # Card selection slots
  selected_card_id:
    type: text
    mappings:
      - type: controlled
    scope: project

  # Raw list of transactions fetched by flows (list of dicts)
  transaction_list:
    type: any
    mappings:
      - type: controlled
    scope: project

  # Formatted transaction list for display in responses
  transactions_display:
    type: text
    mappings:
      - type: controlled
    scope: project

  # User profile slots (populated by action_session_start)
  user_name:
    type: text
    mappings:
      - type: controlled
    scope: project

  user_loyalty_memberships:
    type: any
    mappings:
      - type: controlled
    scope: project

actions:
  - action_session_start

responses:
  utter_greeting:
    - text: "Hello! I'm your financial assistant. How can I help you today?"

  utter_greeting_returning:
    - text: "Welcome back! How can I assist you today?"

  utter_action_failed:
    - text: "I'm sorry, something went wrong. Please try again."

  utter_card_not_found:
    - text: "I couldn't find a card with those details. Please check and try again."

  utter_no_transactions_for_card:
    - text: "There are no transactions on file for that card. Try another card."
