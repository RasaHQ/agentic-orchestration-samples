version: "3.1"

slots:
  lock_card_last_four:
    type: text
    mappings:
      - type: from_llm

  lock_card_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_lock_card_last_four:
    - text: "What is the last 4 digits of the credit card you would like to lock?"

  utter_ask_lock_card_confirmation:
    - text: "Are you sure you want to lock the card ending in {lock_card_last_four}? This action cannot be undone."

  utter_lock_card_cancelled:
    - text: "No problem, I won't lock your card. Let me know if you need anything else."

  utter_card_locked:
    - text: "Done! Your card ending in {lock_card_last_four} has been locked. No new transactions will be authorized until you unlock it."

  utter_card_already_locked:
    - text: "That card is already locked."

actions:
  - action_lock_card
