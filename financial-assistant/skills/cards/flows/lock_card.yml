responses:
  utter_ask_lock_card_last_four:
    - text: "What is the last 4 digits of the credit card you would like to lock?"

  utter_ask_lock_card_confirmation:
    - text: "Are you sure you want to lock the card ending in {lock_card_last_four}? This action cannot be undone."

  utter_lock_card_cancelled:
    - text: "No problem, I won't lock your card. Let me know if you need anything else."

  utter_card_locked:
    - text: "Done! Your card ending in {lock_card_last_four} has been locked. No new transactions will be authorized until you unlock it."

  utter_card_already_locked:
    - text: "That card is already locked."

flows:
  lock_card:
    name: lock credit card
    description: Lock a credit card to prevent unauthorized transactions
    steps:
      - collect: lock_card_last_four
        description: The last 4 digits of the credit card to lock
      - collect: lock_card_confirmation
        ask_before_filling: true
        description: Confirmation from the user to lock the card
        next:
          - if: slots.lock_card_confirmation is not true
            then:
              - action: utter_lock_card_cancelled
                next: END
          - else: execute_lock
      - id: execute_lock
        action: action_lock_card
        next:
          - if: slots.return_value = 'success'
            then:
              - action: utter_card_locked
                next: END
          - if: slots.return_value = 'not_found'
            then:
              - action: utter_card_not_found
                next: END
          - if: slots.return_value = 'already_locked'
            then:
              - action: utter_card_already_locked
                next: END
          - else:
              - action: utter_action_failed
                next: END
