responses:
  utter_dispute_success:
    - text: "I've successfully disputed the selected transaction(s). You'll receive a confirmation email shortly, and our fraud team will investigate within 2-3 business days."

  utter_dispute_failed:
    - text: "I'm sorry, I couldn't process the dispute. Please try again or contact customer support."

  utter_suggest_lock_card:
    - text: "For your security, would you also like me to lock your card to prevent any further unauthorized transactions?"

  utter_ask_filter_transactions_card_last_four:
    - text: "What is the last 4 digits of the credit card you would like to filter transactions for?"

  utter_ask_filter_transactions_filters:
    - text: "What filters would you like to apply to the transactions?"

  utter_ask_selected_transactions:
    - text: "What transactions would you like to see?"

  utter_selected_transactions:
    - text: "Here are the transactions that match your filters for the card ending in {filter_transactions_card_last_four}:\n\n{transactions_display}"
