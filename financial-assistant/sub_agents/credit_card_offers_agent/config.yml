agent:
  name: credit_card_offers_agent
  protocol: rasa
  description: |
    Provides personalized credit card recommendations based on user profile and preferences.
    Leverages cross-conversation memory to recall loyalty memberships, travel preferences,
    and past interactions to make relevant suggestions.

configuration:
  prompt_template: ./sub_agents/credit_card_offers_agent/prompt_template.jinja2
  module: custom.credit_card_offers_agent.CreditCardOffersAgent
