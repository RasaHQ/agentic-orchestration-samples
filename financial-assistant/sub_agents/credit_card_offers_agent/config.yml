agent:
  name: credit_card_offers_agent
  protocol: rasa
  description: |
    Helps users find the best credit card for their needs by first collecting their preferences
    (spending habits, rewards type, annual fee tolerance, travel frequency) and then recommending
    suitable card options based on those preferences.

configuration:
  prompt_template: ./sub_agents/credit_card_offers_agent/prompt_template.jinja2
  module: custom.credit_card_offers_agent.CreditCardOffersAgent

connections:
  mcp_servers:
    - name: credit_card_offers
