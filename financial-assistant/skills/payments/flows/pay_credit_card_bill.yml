responses:
  utter_show_balance:
    - text: "Your card ending in {pay_bill_card_last_four} has a balance of ${card_balance_due} due by {card_due_date}."

  utter_payment_cancelled:
    - text: "No problem, I've cancelled the payment. Let me know if you need anything else."

  utter_payment_success:
    - text: "Payment successful! I've applied ${pay_bill_amount} to your card ending in {pay_bill_card_last_four}. Your new balance is ${payment_new_balance}."

  utter_payment_exceeds_balance:
    - text: "That amount exceeds your current balance due. Would you like to pay a different amount?"

  utter_ask_pay_bill_card_last_four:
    - text: "What is the last 4 digits of the credit card you would like to pay?"

  utter_ask_pay_bill_amount:
    - text: "How much would you like to pay towards the credit card bill?"

  utter_ask_pay_bill_confirmation:
    - text: "Are you sure you want to pay ${pay_bill_amount} to your card ending in {pay_bill_card_last_four}? This action cannot be undone."

flows:
  pay_credit_card_bill:
    name: pay credit card bill
    description: Pay towards a credit card balance
    steps:
      - collect: pay_bill_card_last_four
        description: The last 4 digits of the credit card to pay
      - action: action_get_card_balance
        next:
          - if: slots.return_value = 'not_found'
            then:
              - action: utter_card_not_found
                next: END
          - else: show_balance
      - id: show_balance
        action: utter_show_balance
      - collect: pay_bill_amount
        description: The amount to pay towards the credit card bill
      - collect: pay_bill_confirmation
        ask_before_filling: true
        description: Confirmation from the user to process the payment
        next:
          - if: slots.pay_bill_confirmation is not true
            then:
              - action: utter_payment_cancelled
                next: END
          - else: process_payment
      - id: process_payment
        action: action_pay_bill
        next:
          - if: slots.return_value = 'success'
            then:
              - action: utter_payment_success
                next: END
          - if: slots.return_value = 'exceeds_balance'
            then:
              - action: utter_payment_exceeds_balance
                next: END
          - else:
              - action: utter_action_failed
                next: END

