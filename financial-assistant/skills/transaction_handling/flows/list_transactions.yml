responses:
  utter_ask_filter_transactions_card_last_four:
    - text: "What is the last 4 digits of the credit card you would like to filter transactions for?"

  utter_ask_filter_transactions_filters:
    - text: "Would you like to filter the transactions or see all of them?"

  utter_ask_selected_transactions:
    - text: "What transactions would you like to see?"

  utter_selected_transactions:
    - text: "Here are the transactions that match your filters for the card ending in {filter_transactions_card_last_four}:\n\n{transactions_display}"

flows:
  list_transactions:
    name: list transactions
    description: |
      Show or filter transactions on a card by merchant (e.g. Amazon, Café Nero),
      date, amount, category, or location. Use when the user asks to see transactions
      "for" a merchant, "at" a place, or by any filter criterion.
    crucial_memory_items:
      - project.transaction_list
      - transaction_handling.filter_transactions_filters
    steps:
      - collect: filter_transactions_card_last_four
        description: The last 4 digits of the credit card to filter transactions for
      - action: action_list_transactions
        next:
          - if: slots.return_value = 'card_not_found'
            then:
              - action: utter_card_not_found
                next: END
          - if: slots.return_value = 'no_transactions'
            then:
              - action: utter_no_transactions_for_card
                next: END
          - else: collect_filters
      - id: collect_filters
        collect: filter_transactions_filters
        description: |
          The filter criterion from the user's message or "all" in case the user wants
          to see all transactions. In case the user wants to filter the transactions
          set the filter criterion to the merchant name, date,
          amount, category, or location they asked for. Examples: "Show transactions for
          Amazon" → set to "Amazon"; "charges at Café Nero" → "Café Nero"; "last week" →
          the date or range. Extract the exact word or phrase the user used for the filter.
      - collect: selected_transactions
        description: The transactions that match the filters
      - action: action_format_transactions
      - id: show_transactions
        action: utter_selected_transactions
