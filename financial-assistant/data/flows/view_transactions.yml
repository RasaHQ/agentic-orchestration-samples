flows:
  view_transactions:
    name: view transactions
    description: |
      View credit card transactions for a specific card. Shows recent transactions
      with details like date, merchant, amount, and location.
    steps:
      - collect: view_transactions_card_last_four
        description: The last 4 digits of the credit card to view transactions for
      - action: action_view_transactions
        next:
          - if: slots.return_value = 'card_not_found'
            then:
              - action: utter_card_not_found
                next: END
          - if: slots.return_value = 'no_transactions'
            then:
              - action: utter_no_transactions_found
                next: END
          - if: slots.return_value = 'success'
            then:
              - action: utter_show_transactions
                next: END
          - else:
              - action: utter_action_failed
                next: END
