agent:
  name: transaction_agent
  protocol: rasa
  description: |
    Handles disputing credit card transactions. Accepts transaction IDs from users
    and marks them as disputed for fraud investigation.
  
configuration:
  prompt_template: ./sub_agents/transaction_agent/prompt_template.jinja2
  module: custom.transaction_agent.TransactionAgent

connections:
  mcp_servers:
    - name: transactions
